name: Generate Manifest File

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Setting concurrency to ensure that only one rebase workflow runs at a time.
concurrency:
  group: commit-to-repo
  cancel-in-progress: false

env:
  MAIN_BRANCH: main
permissions:
  contents: write
  packages: write

jobs:
  build-iut-provider:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      version: ${{ steps.image.outputs.version }}
    steps:
    - uses: actions/checkout@v6
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Image ID
      id: image
      run: |
        IMAGE_ID=ghcr.io/eiffel-community/etos-iut-provider
        # Strip git ref prefix from version
        VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
        # Strip "v" prefix from tag name
        [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
        # Use Docker `latest` tag convention
        [ "$VERSION" == "$MAIN_BRANCH" ] && VERSION=$(echo ${{ github.sha }} | cut -c1-8)
        echo VERSION=$VERSION
        echo "image=$IMAGE_ID" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Build app image
      run: make iutprovider-docker IMG=${{ steps.image.outputs.image }}:${{ steps.image.outputs.version}}
    - name: Push app image
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Pushing image ${{ steps.image.outputs.image }}:${{ steps.image.outputs.version }}"
        make docker-push IMG=${{ steps.image.outputs.image }}:${{ steps.image.outputs.version}}
  build-execution-space-provider:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      version: ${{ steps.image.outputs.version }}
    steps:
    - uses: actions/checkout@v6
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Image ID
      id: image
      run: |
        IMAGE_ID=ghcr.io/eiffel-community/etos-execution-space-provider
        # Strip git ref prefix from version
        VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
        # Strip "v" prefix from tag name
        [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
        # Use Docker `latest` tag convention
        [ "$VERSION" == "$MAIN_BRANCH" ] && VERSION=$(echo ${{ github.sha }} | cut -c1-8)
        echo VERSION=$VERSION
        echo "image=$IMAGE_ID" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Build app image
      run: make executionspaceprovider-docker IMG=${{ steps.image.outputs.image }}:${{ steps.image.outputs.version}}
    - name: Push app image
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Pushing image ${{ steps.image.outputs.image }}:${{ steps.image.outputs.version }}"
        make docker-push IMG=${{ steps.image.outputs.image }}:${{ steps.image.outputs.version}}
  build-log-area-provider:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      version: ${{ steps.image.outputs.version }}
    steps:
    - uses: actions/checkout@v6
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Image ID
      id: image
      run: |
        IMAGE_ID=ghcr.io/eiffel-community/etos-log-area-provider
        # Strip git ref prefix from version
        VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
        # Strip "v" prefix from tag name
        [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
        # Use Docker `latest` tag convention
        [ "$VERSION" == "$MAIN_BRANCH" ] && VERSION=$(echo ${{ github.sha }} | cut -c1-8)
        echo VERSION=$VERSION
        echo "image=$IMAGE_ID" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Build app image
      run: make logareaprovider-docker IMG=${{ steps.image.outputs.image }}:${{ steps.image.outputs.version}}
    - name: Push app image
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Pushing image ${{ steps.image.outputs.image }}:${{ steps.image.outputs.version }}"
        make docker-push IMG=${{ steps.image.outputs.image }}:${{ steps.image.outputs.version}}
  build-environment-provider:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      version: ${{ steps.image.outputs.version }}
    steps:
    - uses: actions/checkout@v6
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Image ID
      id: image
      run: |
        IMAGE_ID=ghcr.io/eiffel-community/etos-environment-provider-pipeline
        # Strip git ref prefix from version
        VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
        # Strip "v" prefix from tag name
        [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
        # Use Docker `latest` tag convention
        [ "$VERSION" == "$MAIN_BRANCH" ] && VERSION=$(echo ${{ github.sha }} | cut -c1-8)
        echo VERSION=$VERSION
        echo "image=$IMAGE_ID" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Build app image
      run: make environmentprovider-docker IMG=${{ steps.image.outputs.image }}:${{ steps.image.outputs.version}}
    - name: Push app image
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Pushing image ${{ steps.image.outputs.image }}:${{ steps.image.outputs.version }}"
        make docker-push IMG=${{ steps.image.outputs.image }}:${{ steps.image.outputs.version}}
  build-controller:
    needs: [build-iut-provider, build-execution-space-provider, build-log-area-provider, build-environment-provider]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Clean workspace
        run: |
          rm -r dist | true
      - name: Image ID
        id: image
        run: |
          IMAGE_ID=ghcr.io/eiffel-community/etos-controller
          # Strip git ref prefix from version
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
          # Strip "v" prefix from tag name
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
          # Use Docker `latest` tag convention
          [ "$VERSION" == "main" ] && VERSION=$(echo ${{ github.sha }} | cut -c1-8)
          echo VERSION=$VERSION
          echo "image=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Update provider manifests
        uses: fjogeleit/yaml-update-action@main
        with:
          commitChange: false
          changes: |
            {
              "defaults/iut_provider.yaml": {
                ".image": "${{ needs.build-iut-provider.outputs.image }}",
                ".version": "${{ needs.build-iut-provider.outputs.version }}"
              },
              "defaults/execution_space_provider.yaml": {
                ".image": "${{ needs.build-execution-space-provider.outputs.image }}",
                ".version": "${{ needs.build-execution-space-provider.outputs.version }}"
              },
              "defaults/log_area_provider.yaml": {
                ".image": "${{ needs.build-log-area-provider.outputs.image }}",
                ".version": "${{ needs.build-log-area-provider.outputs.version }}"
              },
              "defaults/environment_provider.yaml": {
                ".image": "${{ needs.build-environment-provider.outputs.image }}",
                ".version": "${{ needs.build-environment-provider.outputs.version }}"
              }
            }
      - name: Build controller and generate manifest
        run: |
          make docker-build split-installer IMG=${{steps.image.outputs.image}}:${{steps.image.outputs.version}}
          mkdir -p manifests/controller
          cp dist/* manifests/controller/
      - name: Push docker image
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Pushing image ${{ steps.image.outputs.image }}:${{ steps.image.outputs.version }}"
          make docker-push IMG=${{ steps.image.outputs.image }}:${{ steps.image.outputs.version}}
      - name: Commit changes
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Update install manifest [skip ci]"
          git push origin main
