# Example: ETOS suite definition (v1alpha1)
# Demonstrates multiple suites, dependencies, and provider-defined resources.
name: example-api-tests
schemaVersion: v1alpha1
suites:
- priority: 1
  testExecutions:
  - id: "api-integration-test"
    testcase:
      id: tests/integration/test_api.py::TestAPI::test_create_resource
      version: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      repository: https://github.com/example-org/test-suite.git
      uri: https://docs.example.org/tests/integration/test_api
    execution:
      checkout:
      - "git clone https://github.com/example-org/test-suite.git -b a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2 test-suite"
      command: "pytest --output-folder=$TEST_ARTIFACT_PATH/ test-suite/tests/integration/test_api.py::TestAPI::test_create_resource"
      preExecution: []
    environment:
      testRunner: ghcr.io/eiffel-community/etos-base-test-runner:latest
      environmentVariables:
        LOG_LEVEL: DEBUG
        API_ENDPOINT: https://api.example.org
      additionalResources:
      - type: device
        model: example-board
        features:
        - GPIO
        - WiFi

  - id: "api-delete-test"
    testcase:
      id: tests/integration/test_api.py::TestAPI::test_delete_resource
      version: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      repository: https://github.com/example-org/test-suite.git
      uri: https://docs.example.org/tests/integration/test_api
    dependencies:
    - "api-integration-test"
    execution:
      checkout:
      - "git clone https://github.com/example-org/test-suite.git -b a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2 test-suite"
      command: "pytest --output-folder=$TEST_ARTIFACT_PATH/ test-suite/tests/integration/test_api.py::TestAPI::test_delete_resource"
      preExecution:
      - "pip install requests"
    environment:
      testRunner: ghcr.io/eiffel-community/etos-base-test-runner:latest
      environmentVariables:
        LOG_LEVEL: INFO
      additionalResources:
      - type: container
        image: postgres:16
        environmentVariables:
          POSTGRES_DB: testdb
          POSTGRES_PASSWORD: test

- priority: 2
  testExecutions:
  - id: "smoke-test"
    testcase:
      id: tests/smoke/test_health.py::TestHealth::test_ping
    execution:
      command: "pytest tests/smoke/test_health.py::TestHealth::test_ping"
    environment:
      testRunner: ghcr.io/eiffel-community/etos-base-test-runner:latest
