# Example: ETOS suite definition (v1alpha1)
#
# Demonstrates the key features of the format: multiple prioritized suites,
# test execution dependencies, checkout and pre-execution steps, environment
# variables, multiple test runner images, and provider-defined additional
# resources.
name: etos-sample-suite
schemaVersion: v1alpha1
suites:
- priority: 1
  testExecutions:
  - id: "sample-test"
    testcase:
      id: etos-sample-test
      version: main
      repository: https://github.com/eiffel-community/etos
    execution:
      checkout:
      - "git clone https://github.com/eiffel-community/etos"
      command: "exit 0"
    environment:
      testRunner: ghcr.io/eiffel-community/etos-base-test-runner:ubuntu-noble
      environmentVariables:
        LOG_LEVEL: DEBUG

  - id: "sample-test-with-resources"
    testcase:
      id: etos-sample-test
      version: main
      repository: https://github.com/eiffel-community/etos
    dependencies:
    - "sample-test"
    execution:
      checkout:
      - "git clone https://github.com/eiffel-community/etos"
      preExecution:
      - "pip install requests"
      command: "exit 0"
    environment:
      testRunner: ghcr.io/eiffel-community/etos-base-test-runner:debian-bookworm
      environmentVariables:
        LOG_LEVEL: INFO
      additionalResources:
      - type: container
        image: postgres:16
        environmentVariables:
          POSTGRES_DB: testdb
          POSTGRES_PASSWORD: test
      - type: device
        model: example-board
        features:
        - GPIO
        - WiFi

- priority: 2
  testExecutions:
  - id: "smoke-test"
    testcase:
      id: etos-sample-test
      version: main
    execution:
      command: "exit 0"
    environment:
      testRunner: ghcr.io/eiffel-community/etos-base-test-runner:ubuntu-noble
